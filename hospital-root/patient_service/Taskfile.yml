version: '3'

tasks:
  install:
    desc: Runs pipenv install
    cmds:
      - pipenv install --dev

  migrate:
    desc: Runs Alembic migrations idempotently
    cmds:
      - PYTHONPATH=. pipenv run alembic upgrade head

  run:dev:
    desc: Starts the patient gRPC server locally
    cmds:
      - PYTHONPATH=. pipenv run python -m app.main

  test:
    desc: Executes unit and integration tests
    cmds:
      - pipenv run pytest

  generate:
    desc: Compiles .proto files into the generated/ folder
    cmds:
      - mkdir -p generated
      - pipenv run python -m grpc_tools.protoc -I../protos --python_out=generated --grpc_python_out=generated ../protos/patient.proto
      - touch generated/__init__.py
      - sed -i 's/import patient_pb2/from . import patient_pb2/' generated/patient_pb2_grpc.py
