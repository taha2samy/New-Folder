version: '3'

tasks:
  setup:
    desc: Install all service dependencies via Pipenv
    cmds:
      - pipenv install --dev

  generate:
    desc: Generate gRPC stubs from billing.proto
    cmds:
      - mkdir -p generated
      - pipenv run python -m grpc_tools.protoc -I../protos --python_out=./generated --grpc_python_out=./generated ../protos/billing.proto
      - touch generated/__init__.py
      - sed -i 's/import billing_pb2 as billing__pb2/from . import billing_pb2 as billing__pb2/' generated/billing_pb2_grpc.py

  migrate:
    desc: Apply Alembic database migrations
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - sh -c "set -e; pipenv run alembic upgrade head || echo 'Migration up-to-date or failed expectedly'"

  run:
    desc: Start the billing gRPC server locally
    cmds:
      - PYTHONPATH=. pipenv run python -m app.main

  run:dev:
    desc: Start the billing gRPC server locally (dev alias)
    cmds:
      - PYTHONPATH=. pipenv run python -m app.main
