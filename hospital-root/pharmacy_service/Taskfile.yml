version: '3'

tasks:
  setup:
    desc: "Install dependencies (pipenv)"
    cmds:
      - pipenv install --dev

  generate:
    desc: "Generate gRPC stubs from central protos"
    cmds:
      - mkdir -p app/generated
      - touch app/generated/__init__.py
      - pipenv run python -m grpc_tools.protoc -I../protos --python_out=app/generated --grpc_python_out=app/generated ../protos/*.proto
      - sed -i.bak 's/import \([a-z0-9_]*_pb2\)/from . import \1/g' app/generated/*_pb2_grpc.py
      - rm -f app/generated/*.bak

  migrate:
    desc: "Run database migrations"
    cmds:
      - PYTHONPATH=. pipenv run alembic upgrade head
  gen-reqs:
    desc: "Convert Pipfile to requirements.txt"
    cmds:
      - PYTHONPATH=. pipenv requirements > requirements.txt

  run:
    desc: "Start the local dev server"
    cmds:
      - PYTHONPATH=. pipenv run python -m app.main

  test:
    desc: "Run unit/integration tests"
    cmds:
      - pipenv run pytest

  clean:
    desc: "Wipe generated files and caches"
    cmds:
      - rm -rf app/generated
      - find . -type d -name "__pycache__" -exec rm -rf {} +
      - find . -type d -name ".pytest_cache" -exec rm -rf {} +