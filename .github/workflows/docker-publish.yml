# ============================================================================
# Hospital Management System — Secure CI Pipeline (Build, Push & Attest)
# ============================================================================
# This workflow performs the following in parallel for all microservices:
#   1. Sets up a multi-arch build environment (AMD64 & ARM64).
#   2. Builds Docker images using the monorepo root (`./hospital-root`) as context.
#   3. Pushes the images to GitHub Container Registry (GHCR).
#   4. Generates an unforgeable SLSA v1.0 Provenance Attestation using
#      Sigstore (OIDC keyless signing) and attaches it to the image digest.
# ============================================================================

name: Secure Build, Push & Attest

# Trigger only on push to main to ensure we only attest stable, merged code.
on:
  push:
    branches:
      - main

# Cancel redundant in-progress runs if multiple pushes happen quickly.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-attest:
    name: 🏗️ Build & Attest [${{ matrix.service }}]
    runs-on: ubuntu-latest

    # -------------------------------------------------------------------------
    # STRICT PERMISSIONS FOR DEVSECOPS (CRITICAL)
    # -------------------------------------------------------------------------
    # id-token:     Required by Sigstore to request an OIDC token for keyless signing.
    # packages:     Required to push the Docker image to GHCR.
    # attestations: Required to write the SLSA provenance to the GitHub API.
    # contents:     Required to checkout the source code.
    # -------------------------------------------------------------------------
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    strategy:
      # If one microservice fails to build, stop the others to save Action minutes.
      fail-fast: true
      matrix:
        service:
          - patient_service
          - clinical_service
          - pharmacy_service
          - laboratory_service
          - master_data_service
          - billing_service
          - aggregator_service

    steps:
      # -----------------------------------------------------------------------
      # Step 1: Checkout Source Code
      # -----------------------------------------------------------------------
      - name: 📥 Checkout Monorepo
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Step 2: GHCR Uppercase Hotfix
      # GHCR explicitly rejects uppercase letters in the image path.
      # This converts the GitHub owner name (e.g., JohnDoe -> johndoe) 
      # and saves it to GITHUB_ENV for all subsequent steps.
      # -----------------------------------------------------------------------
      - name: 🔤 Set lowercase repository owner
        run: |
          echo "REPO_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV