name: Build Python with Predefined Run Image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image Tag'
        required: true
        default: 'latest'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pack CLI
        uses: buildpacks/github-actions/setup-pack@v5.12.0

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Custom Run Image
        run: |
          REPO_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          RUN_IMAGE=ghcr.io/$REPO_LOWER/hms-run-base:latest
          
          docker build -t $RUN_IMAGE -f infra/run-image/Dockerfile .
          docker push $RUN_IMAGE
          echo "CUSTOM_RUN_IMAGE=$RUN_IMAGE" >> $GITHUB_ENV

      - name: Build and Push App
        run: |
          REPO_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          APP_IMAGE=ghcr.io/$REPO_LOWER/hms-master-data-service:${{ github.event.inputs.tag }}
          
          pack build $APP_IMAGE \
            --path ./hospital-root/master_data_service \
            --builder paketobuildpacks/builder-jammy-base \
            --run-image ${{ env.CUSTOM_RUN_IMAGE }} \
            --env BP_PYTHON_VERSION=3.10 \
            --publish