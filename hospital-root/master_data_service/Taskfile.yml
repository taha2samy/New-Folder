version: '3'

tasks:
  setup:
    desc: Install all service dependencies via Pipenv
    cmds:
      - pipenv install --dev

  generate:
    desc: Compiles .proto files into the generated/ folder
    cmds:
      - mkdir -p generated
      - pipenv run python -m grpc_tools.protoc -I../protos --python_out=./generated --grpc_python_out=./generated ../protos/master_data.proto
      - touch generated/__init__.py
      - sed -i 's/import master_data_pb2 as master__data__pb2/from . import master_data_pb2 as master__data__pb2/' generated/master_data_pb2_grpc.py

  migrate:
    desc: Apply Alembic database migrations
    cmds:
      - pipenv run alembic upgrade head

  run:
    desc: Start the master-data gRPC server locally
    cmds:
      - PYTHONPATH=. pipenv run python -m app.main

  run:dev:
    desc: Start the master-data gRPC server locally (dev alias)
    cmds:
      - PYTHONPATH=. pipenv run python -m app.main
