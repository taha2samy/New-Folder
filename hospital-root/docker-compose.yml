version: '3.8'

services:
  frontend-service:
      image: ghcr.io/taha2samy/hms-frontend:latest
      ports:
        - "3000:80" 
      environment:
        - VITE_GRAPH_API_URL=http://localhost:8000/graphql 
        - VITE_MANUAL_TEST_TOKEN=${VITE_MANUAL_TEST_TOKEN} 
      networks:
        - hms_network
      depends_on:
        - aggregator-service

  postgres:
    image: postgres:15-alpine
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - ./init-db.sh:/docker-entrypoint-initdb.d/init.sh
      - pgdata_v3:/var/lib/postgresql/data
    networks:
      - hms_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 5s
      timeout: 5s
      retries: 5

  event-broker:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    command:
      - redpanda start
      - --smp 1
      - --overprovisioned
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://event-broker:9092,external://localhost:19092
    ports:
      - "19092:19092"
      - "9092:9092"
    networks:
      - hms_network
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster info"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redpanda_data:/var/lib/redpanda/data

  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    command: start-dev
    env_file:
      - .env
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak_db
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    ports:
      - "8080:8080"
    networks:
      - hms_network
    depends_on:
      postgres:
        condition: service_healthy

  patient-service:
    image: ghcr.io/taha2samy/hms-patient_service:latest
    env_file:
      - .env
    environment:
      - PATIENT_SVC_DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/patient_db
      - PATIENT_SVC_KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS}
      - PATIENT_SVC_JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - PATIENT_SVC_JWT_ALGORITHM=${JWT_ALGORITHM}
      - PATIENT_SVC_GRPC_PORT=50051
    ports:
      - "50051:50051"
    networks:
      - hms_network
    depends_on:
      postgres:
        condition: service_healthy

  clinical-service:
    image: ghcr.io/taha2samy/hms-clinical_service:latest
    env_file:
      - .env
    environment:
      - CLINICAL_SVC_DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/clinical_db
      - CLINICAL_SVC_KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS}
      - CLINICAL_SVC_PATIENT_SERVICE_ADDR=patient-service:50051
      - CLINICAL_SVC_JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - CLINICAL_SVC_JWT_ALGORITHM=${JWT_ALGORITHM}
      - CLINICAL_SVC_GRPC_PORT=50052
    ports:
      - "50052:50052"
    networks:
      - hms_network
    depends_on:
      postgres:
        condition: service_healthy
      event-broker:
        condition: service_healthy

  pharmacy-service:
    image: ghcr.io/taha2samy/hms-pharmacy_service:latest
    env_file:
      - .env
    environment:
      - PHARMACY_SVC_DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/pharmacy_db
      - PHARMACY_SVC_KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS}
      - PHARMACY_SVC_JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - PHARMACY_SVC_JWT_ALGORITHM=${JWT_ALGORITHM}
      - PHARMACY_SVC_GRPC_PORT=50053
    ports:
      - "50053:50053"
    networks:
      - hms_network
    depends_on:
      postgres:
        condition: service_healthy
      event-broker:
        condition: service_healthy

  laboratory-service:
    image: ghcr.io/taha2samy/hms-laboratory_service:latest
    env_file:
      - .env
    environment:
      - LABORATORY_SVC_DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/laboratory_db
      - LABORATORY_SVC_KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS}
      - LABORATORY_SVC_JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - LABORATORY_SVC_JWT_ALGORITHM=${JWT_ALGORITHM}
      - LABORATORY_SVC_GRPC_PORT=50054
    ports:
      - "50054:50054"
    networks:
      - hms_network
    depends_on:
      postgres:
        condition: service_healthy
      event-broker:
        condition: service_healthy

  master-data-service:
    image: ghcr.io/taha2samy/hms-master_data_service:latest
    env_file:
      - .env
    environment:
      - MASTER_DATA_SVC_DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/reference_db
      - MASTER_DATA_SVC_KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS}
      - MASTER_DATA_SVC_JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - MASTER_DATA_SVC_JWT_ALGORITHM=${JWT_ALGORITHM}
      - MASTER_DATA_SVC_GRPC_PORT=50055
    ports:
      - "50055:50055"
    networks:
      - hms_network
    depends_on:
      postgres:
        condition: service_healthy
      event-broker:
        condition: service_healthy

  billing-service:
    image: ghcr.io/taha2samy/hms-billing_service:latest
    env_file:
      - .env
    environment:
      - BILLING_SVC_DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/billing_db
      - BILLING_SVC_KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS}
      - BILLING_SVC_MASTER_DATA_SERVICE_ADDR=master-data-service:50055
      - BILLING_SVC_CLINICAL_SERVICE_ADDR=clinical-service:50052
      - BILLING_SVC_GRPC_PORT=50056
    ports:
      - "50056:50056"
    networks:
      - hms_network
    depends_on:
      postgres:
        condition: service_healthy
      event-broker:
        condition: service_healthy

  aggregator-service:
    image: ghcr.io/taha2samy/hms-aggregator_service:latest
    env_file:
      - .env
    environment:
      - AGGREGATOR_SVC_DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/aggregator_db
      - AGGREGATOR_SVC_PATIENT_SERVICE_ADDR=patient-service:50051
      - AGGREGATOR_SVC_CLINICAL_SERVICE_ADDR=clinical-service:50052
      - AGGREGATOR_SVC_PHARMACY_SERVICE_ADDR=pharmacy-service:50053
      - AGGREGATOR_SVC_LABORATORY_SERVICE_ADDR=laboratory-service:50054
      - AGGREGATOR_SVC_MASTER_DATA_SERVICE_ADDR=master-data-service:50055
      - AGGREGATOR_SVC_JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - AGGREGATOR_SVC_JWT_ALGORITHM=${JWT_ALGORITHM}
    ports:
      - "8000:8000"
    networks:
      - hms_network
    depends_on:
      patient-service:
        condition: service_started
      clinical-service:
        condition: service_started
      pharmacy-service:
        condition: service_started
      laboratory-service:
        condition: service_started
      master-data-service:
        condition: service_started
      billing-service:
        condition: service_started

networks:
  hms_network:
    driver: bridge

volumes:
  pgdata_v3:
  redpanda_data:
